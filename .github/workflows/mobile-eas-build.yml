name: mobile-eas-build

# Production build + submit on release tags. Tag format:
#   mobile-v<semver>          → preview build only (TestFlight + Play internal)
#   mobile-v<semver>-release  → production build + store submit
#
# Required secrets (GitHub repo → Settings → Secrets):
#   EXPO_TOKEN                — EAS CLI token (Expo dashboard → Access Tokens)
#
# All other env vars (Supabase URL / anon key / Sentry DSN) are pulled
# from EAS Secret at build time — see docs/deployment.md §2-2.

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Authenticate with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN secret is missing. Set it in repo settings."
            exit 1
          fi

      - name: Determine profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ inputs.profile }}" >> $GITHUB_OUTPUT
            echo "platform=${{ inputs.platform }}" >> $GITHUB_OUTPUT
          else
            if [[ "${{ github.ref_name }}" == *-release ]]; then
              echo "profile=production" >> $GITHUB_OUTPUT
            else
              echo "profile=preview" >> $GITHUB_OUTPUT
            fi
            echo "platform=all" >> $GITHUB_OUTPUT
          fi

      - name: EAS Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --profile ${{ steps.profile.outputs.profile }} \
            --platform ${{ steps.profile.outputs.platform }} \
            --non-interactive \
            --no-wait

      # Store submit is a separate opt-in job so we can review the build
      # before it hits TestFlight/Play. Run via workflow_dispatch after
      # verifying the EAS build artifact.
